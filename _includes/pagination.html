{% if pagination.pages.length > 1 %}
  <div class="pagination">
    {% if pagination.href.next %}
      <a class="previous" href="{{ pagination.href.next | relative_url }}">&laquo; Older</a>
    {% endif %}

    {% if pagination.href.previous %}
      <a class="next" href="{{ pagination.href.previous | relative_url }}">Newer &raquo;</a>
    {% endif %}
  </div>
{% endif %}
